# ============================================================
#  SnowFoxOS v2 — Foot Terminal Config
# ============================================================

[main]
term=xterm-256color
font=Noto Sans Mono:size=11
dpi-aware=auto
pad=12x8

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[colors]
# SnowFoxOS Dark Theme
background=0a0a0a
foreground=e0e0e0

# Normales Schwarz / Weiss
regular0=1a1a1a
regular7=c0c0c0
bright0=555555
bright7=ffffff

# Rot
regular1=e74c3c
bright1=ff6b6b

# Grün
regular2=2ecc71
bright2=55efc4

# Gelb / Orange
regular3=e67e22
bright3=fdcb6e

# Blau (→ Lila für SnowFox)
regular4=9b59b6
bright4=a29bfe

# Magenta
regular5=e91e8c
bright5=fd79a8

# Cyan
regular6=1abc9c
bright6=00cec9

# Selektion
selection-foreground=ffffff
selection-background=9b59b6

# URLs
urls=E67E22
